name: CI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_call:
    outputs:
      gitversion:
        description: The output of GitVersion
        value: ${{ jobs.build.outputs.gitversion }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      gitversion: ${{ toJSON(steps.gitversion.outputs) }}

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      with:
        versionSpec: '6.x'

    - name: Use GitVersion
      uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      id: gitversion

    - name: Use GitVersion to update project
      uses: gittools/actions/gitversion/command@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      with:
        arguments: '/updateprojectfiles'

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Package EXILED
      run: |
        mkdir --parents dist/package-exiled/

        cp SpectatorDisabler.Exiled/bin/Release/net48/SpectatorDisabler.Exiled-*.dll dist/package-exiled/
        cp SpectatorDisabler.Exiled/bin/Release/net48/SpectatorDisabler.HarmonyPatches-*.dll dist/package-exiled/
        cp SpectatorDisabler.Exiled/bin/Release/net48/SpectatorDisabler.TowerTools-*.dll dist/package-exiled/

        cd dist/package-exiled
        zip -r ../SpectatorDisabler-Exiled-${{ steps.gitversion.outputs.AssemblySemVer }}.zip .

    - name: Package LabApi
      run: |
        mkdir --parents dist/package-labapi/plugins/
        mkdir --parents dist/package-labapi/dependencies/

        cp SpectatorDisabler.LabApi/bin/Release/net48/SpectatorDisabler.LabApi-*.dll dist/package-labapi/plugins/
        cp SpectatorDisabler.LabApi/bin/Release/net48/SpectatorDisabler.HarmonyPatches-*.dll dist/package-labapi/plugins/
        cp SpectatorDisabler.LabApi/bin/Release/net48/SpectatorDisabler.TowerTools-*.dll dist/package-labapi/plugins/
        cp SpectatorDisabler.LabApi/bin/Release/net48/0Harmony.dll dist/package-labapi/dependencies/

        cd dist/package-labapi
        zip -r ../SpectatorDisabler-LabApi-${{ steps.gitversion.outputs.AssemblySemVer }}.zip .

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: artifact
        path: dist/*.zip
        if-no-files-found: error
